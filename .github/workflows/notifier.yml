# Poll upstream listings, email new rows (optional SMTP secrets), persist state in-repo.
#
# Filter source and categories: edit notifier.toml at the repo root (committed).
#
# Setup (repo Settings → Secrets and variables → Actions):
#   Secrets: OPENAI_API_KEY, SMTP_HOST, SMTP_FROM, SMTP_TO, and usually
#            SMTP_USER, SMTP_PASSWORD (optional: SMTP_PORT default 587,
#            SMTP_SUBJECT_PREFIX)
#   Variable: OPENAI_PRESTIGE_MODEL (optional; default gpt-5.6-terra)
#
# First time: run this workflow manually with "bootstrap" checked, or rely on
# auto-bootstrap when .github/internship-notifier-state.json is missing or has
# empty seen_ids.

name: Internship notifier

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Run with --bootstrap (mark all current matches as seen)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: internship-notifier
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_PRESTIGE_MODEL: ${{ vars.OPENAI_PRESTIGE_MODEL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: ${{ secrets.SMTP_TO }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_SUBJECT_PREFIX: ${{ secrets.SMTP_SUBJECT_PREFIX }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Poll and notify
        run: |
          set -euo pipefail
          STATE_PATH=".github/internship-notifier-state.json"
          PRESTIGE_CACHE_PATH=".github/company-prestige-cache.json"
          COMMON=(
            python -m internship_notifier
            --state-path "$STATE_PATH"
            --prestige-cache-path "$PRESTIGE_CACHE_PATH"
          )

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            "${COMMON[@]}" --bootstrap
          fi

          if ! python -c "import json, pathlib, sys; p=pathlib.Path('$STATE_PATH'); sys.exit(0 if p.is_file() and json.loads(p.read_text(encoding='utf-8')).get('seen_ids') else 1)"; then
            "${COMMON[@]}" --bootstrap
          fi

          "${COMMON[@]}"

      - name: Generate prestige rankings report
        run: |
          python -m internship_notifier.prestige_report \
            --cache .github/company-prestige-cache.json \
            --output docs/company-prestige-rankings.md

      - name: Commit notifier data if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            .github/internship-notifier-state.json \
            .github/company-prestige-cache.json \
            docs/company-prestige-rankings.md
          do
            if [ -f "$path" ]; then
              git add "$path"
            fi
          done
          if git diff --staged --quiet; then
            echo "No notifier data changes to commit."
          else
            git commit -m "chore: update internship notifier data"
            git push
          fi
