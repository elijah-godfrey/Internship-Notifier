# Edit this file to change which listings you track (no secrets here).
# Run from the repo root (or pass --config / set NOTIFIER_CONFIG).

source = "all" # summer2026 | offseason | all

# Set true to include every category for that source.
all_categories = true

# When all_categories is false, list exact upstream category names (repeat in TOML for several).
categories = ["Software Engineering"]

# Only notify for companies ranked at least as prestigious as Carta.
[prestige]
benchmark_company = "Carta"
